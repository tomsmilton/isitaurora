name: Daily train report

on:
  # 02:00 UTC every day. UK winter = 02:00 local, UK summer = 03:00 local.
  # Tweak the cron expression if you want a different local time.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate index.html
        env:
          RTT_API_TOKEN: ${{ secrets.RTT_API_TOKEN }}
        run: node generate.mjs

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
            git push
          fi
