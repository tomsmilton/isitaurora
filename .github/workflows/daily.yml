name: Daily train report

on:
  # Aligned to UK summer time (BST, UTC+1): fires at 06, 08, 10, 15, 17, 19, 22 UK local.
  # In UK winter (GMT), these fire one hour earlier (05, 07, 09, 14, 16, 18, 21 local)
  # because cron runs in UTC and can't handle DST. Shift if you care.
  schedule:
    - cron: "0 5,7,9,14,16,18,21 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate index.html
        env:
          RTT_API_TOKEN: ${{ secrets.RTT_API_TOKEN }}
        run: node generate.mjs

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ledger.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
            git push
          fi
